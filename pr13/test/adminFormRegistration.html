<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация администратора</title>
</head>
<body>
  <h1>adminFormRegistration.html</h1>
  <p><a href="index.html">← Назад</a></p>

  <form method="POST" action="adminRegistration.php">
    <label>
      Логин
      <input type="text" name="login" required>
    </label>
    <br><br>
    <label>
      Пароль
      <input type="password" name="password" required>
    </label>
    <br><br>
    <label>
      Подтверждение пароля
      <input type="password" name="passwordConfirm" required>
    </label>
    <br><br>
    <button type="submit">Зарегистрировать</button>
  </form>

  <p><small>Пароль: буквы, цифры, символы !@#$%^_?=; не более 2 одинаковых символов подряд одного типа.</small></p>
</body>
</html>
